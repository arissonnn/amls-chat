<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="refresh" content="0; url=https://valves-take-consensus-environment.trycloudflare.com">
  <title>AMLS — Advanced Medical Life Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0A0E14;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 560px;
      width: 90%;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #E94560, #FF6B6B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    #redirecting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(233,69,96,0.2);
      border-top-color: #E94560;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #fallback { display: none; width: 100%; }
    .status-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
    .status-value { font-size: 0.85rem; font-weight: 500; }
    .status-ok { color: #22C55E; }
    .status-err { color: #EF4444; }
    .status-warn { color: #F59E0B; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot.ok { background: #22C55E; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
    .dot.err { background: #EF4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }
    .dot.warn { background: #F59E0B; box-shadow: 0 0 8px rgba(245,158,11,0.4); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #E94560;
      color: white;
      width: 100%;
      justify-content: center;
    }
    .btn-primary:hover { background: #D63851; transform: translateY(-1px); }
    .url-display {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(255,255,255,0.3);
      word-break: break-all;
      margin-top: 1rem;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .checking .dot { animation: pulse 1s ease-in-out infinite; }
    .redirect-msg { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🏥</div>
    <h1>AMLS</h1>
    <p class="subtitle">Advanced Medical Life Support</p>

    <div id="redirecting">
      <div class="spinner"></div>
      <p class="redirect-msg">Redirecionando para o chat...</p>
    </div>

    <div id="fallback">
      <div class="status-card" id="statusCard">
        <div class="status-row checking" id="rowProxy">
          <span class="status-label">Proxy</span>
          <span class="status-value" id="proxyStatus"><span class="dot warn"></span>Verificando...</span>
        </div>
        <div class="status-row checking" id="rowTunnel">
          <span class="status-label">Tunnel</span>
          <span class="status-value" id="tunnelStatus"><span class="dot warn"></span>Verificando...</span>
        </div>
        <div class="status-row checking" id="rowApi">
          <span class="status-label">API Hermes</span>
          <span class="status-value" id="apiStatus"><span class="dot warn"></span>Verificando...</span>
        </div>
      </div>
      <a class="btn btn-primary" id="accessBtn" href="https://valves-take-consensus-environment.trycloudflare.com" target="_blank" rel="noopener">
        🏥 Acessar AMLS Chat
      </a>
      <div class="url-display" id="tunnelUrl">🔗 https://valves-take-consensus-environment.trycloudflare.com</div>
    </div>
  </div>

  <script>
    const TUNNEL_URL = 'https://valves-take-consensus-environment.trycloudflare.com';

    if (window.top === window.self) {
      fetch(TUNNEL_URL + '/api/ping', {
        mode: 'cors', signal: AbortSignal.timeout(5000)
      })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(() => { window.location.replace(TUNNEL_URL); })
        .catch(() => {
          document.getElementById('redirecting').style.display = 'none';
          document.getElementById('fallback').style.display = 'block';
          checkStatus();
        });
    }

    setTimeout(() => {
      const r = document.getElementById('redirecting');
      const f = document.getElementById('fallback');
      if (r && r.style.display !== 'none') {
        r.style.display = 'none';
        f.style.display = 'block';
        checkStatus();
      }
    }, 6000);

    async function checkStatus() {
      try {
        const r = await fetch('http://localhost:3000/api/ping', { mode: 'cors', signal: AbortSignal.timeout(5000) });
        const d = await r.json();
        if (d.status === 'ok') { proxyStatus.innerHTML = '<span class="dot ok"></span>Online'; rowProxy.className = 'status-row'; }
        else throw new Error();
      } catch { proxyStatus.innerHTML = '<span class="dot err"></span>Offline'; rowProxy.className = 'status-row'; }

      try {
        const r = await fetch(TUNNEL_URL + '/api/ping', { mode: 'cors', signal: AbortSignal.timeout(8000) });
        const d = await r.json();
        if (d.status === 'ok') { tunnelStatus.innerHTML = '<span class="dot ok"></span>Online'; rowTunnel.className = 'status-row'; }
        else throw new Error();
      } catch { tunnelStatus.innerHTML = '<span class="dot err"></span>Offline'; rowTunnel.className = 'status-row'; }

      try {
        const r = await fetch('http://127.0.0.1:8642/v1/models', { mode: 'cors', signal: AbortSignal.timeout(3000) });
        if (r.ok || r.status === 401) { apiStatus.innerHTML = '<span class="dot ok"></span>Online'; }
        else throw new Error();
      } catch { apiStatus.innerHTML = '<span class="dot err"></span>Offline'; }
    }
  </script>
</body>
</html>
